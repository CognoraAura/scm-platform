server:
  port: 8106
  ssl:
    enabled: true
    key-store: classpath:certs/auth-keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: auth-service
    # 要求客户端证书
    client-auth: need
    trust-store: classpath:certs/truststore.p12
    trust-store-password: changeit
    trust-store-type: PKCS12

spring:
  application:
    name: auth-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml?server-addr=${spring.cloud.nacos.server-addr}
      - optional:nacos:common.yaml?server-addr=${spring.cloud.nacos.server-addr}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        enabled: true
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
        port: 8719
      datasource:
        flow:
          nacos:
            server-addr: ${spring.cloud.nacos.server-addr}
            data-id: ${spring.application.name}-sentinel-flow
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.server-addr}
            data-id: ${spring.application.name}-sentinel-degrade
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: degrade
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_auth?currentSchema=public
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:changeme}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:changeme}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 200
          max-wait: 3000ms
          max-idle: 10
          min-idle: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${spring.profiles.active}

dubbo:
  application:
    name: ${spring.application.name}
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}
  consumer:
    timeout: 3000

webauthn:
  rp:
    challenge-expiry-seconds: 120          # 认证挑战过期时间（默认 2 分钟）
    registration-challenge-expiry-seconds: 300  # 注册挑战过期时间（默认 5 分钟）
    credential-inactive-days: 90           # 凭证不活跃阈值（默认 90 天）
    auth-attempt-retention-days: 30        # 认证日志保留时间（默认 30 天）
