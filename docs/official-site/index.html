<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCM Platform</title>
<script>
(function() {
  var lang = navigator.language || navigator.userLanguage || 'en';
  if (lang.startsWith('zh')) {
    window.location.replace('zh/');
  } else {
    window.location.replace('en/');
  }
})();
</script>
<style>
body { background: #fafaf8; color: #1a1a18; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-size: 14px; }
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<p>Redirecting to <a href="en/">English</a> or <a href="zh/">中文</a>…</p>
</body>
</html>
