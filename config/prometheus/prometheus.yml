# Prometheus 閰嶇疆鏂囦欢
# 閲囬泦 SCM Platform 鍚勬湇鍔＄殑鎸囨爣

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'scm-platform'
    environment: 'dev'

# 鍛婅瑙勫垯閰嶇疆
rule_files:
  # - "alerts/*.yml"

# 鏁版嵁閲囬泦閰嶇疆
scrape_configs:
  # Prometheus 鑷韩
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.80.140:9090']

  # Spring Boot Actuator 绔偣
  - job_name: 'scm-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8761']
        labels:
          service: 'gateway'

  - job_name: 'scm-system'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'system'

  - job_name: 'scm-product'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8201']
        labels:
          service: 'product'

  - job_name: 'scm-inventory'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8202']
        labels:
          service: 'inventory'

  - job_name: 'scm-order'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8203']
        labels:
          service: 'order'

  - job_name: 'scm-warehouse'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8204']
        labels:
          service: 'warehouse'

  - job_name: 'scm-logistics'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8205']
        labels:
          service: 'logistics'

  - job_name: 'scm-supplier'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8206']
        labels:
          service: 'supplier'

  # 涓棿浠剁洃鎺?
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']

  # Node Exporter (绯荤粺鎸囨爣)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']