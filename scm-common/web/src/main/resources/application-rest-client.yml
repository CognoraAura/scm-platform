锘縮pring:
  cloud:
    # Spring Cloud LoadBalancer 閰嶇疆
    loadbalancer:
      # 璐熻浇鍧囪　绛栫暐閫夋嫨
      # 鍙€夊€硷細round-robin锛堥粯璁よ疆璇級, random锛堥殢鏈猴級, weighted-round-robin锛堝姞鏉冭疆璇級
      strategy: weighted-round-robin

      # Nacos 鏉冮噸璐熻浇鍧囪　锛堜粎 weighted-round-robin 绛栫暐鐢熸晥锛?      nacos:
        enabled: true

      # 鍋ュ悍妫€鏌ラ厤缃?      health-check:
        # 鍚敤鍋ュ悍妫€鏌ワ紝杩囨护涓嶅仴搴风殑瀹炰緥
        path:
          enabled: true

      # 缂撳瓨閰嶇疆
      cache:
        # 鍚敤瀹炰緥鍒楄〃缂撳瓨锛屽噺灏?Nacos 鏌ヨ棰戠巼
        enabled: true
        # 缂撳瓨 TTL锛堢锛?        ttl: 35
        # 缂撳瓨瀹归噺
        capacity: 256

      # 閲嶈瘯閰嶇疆
      retry:
        enabled: true
        # 鏈€澶ч噸璇曟鏁?        max-retries-on-same-service-instance: 0
        max-retries-on-next-service-instance: 1

# RestClient 閰嶇疆
rest:
  client:
    # 杩炴帴瓒呮椂锛堟绉掞級
    connect-timeout: 5000
    # 璇诲彇瓒呮椂锛堟绉掞級
    read-timeout: 30000

    # mTLS 璇佷功閰嶇疆
    mtls:
      enabled: true
      keystore:
        location: classpath:certs/client-keystore.p12
        password: ${KEYSTORE_PASSWORD:changeit}
        type: PKCS12
      truststore:
        location: classpath:certs/client-truststore.p12
        password: ${TRUSTSTORE_PASSWORD:changeit}
        type: PKCS12

    # HMAC 绛惧悕閰嶇疆
    signature:
      enabled: true
      app-id: ${API_APP_ID:scm-internal-service}
      secret-key: ${API_SECRET_INTERNAL_SERVICE:your-secret-key-here}
      # 绛惧悕绠楁硶: HmacSHA256, HmacSHA512
      algorithm: HmacSHA256
      # 绛惧悕鏈夋晥鏈燂紙绉掞級锛岄槻姝㈤噸鏀炬敾鍑?      max-age: 300

# Sentinel 闄愭祦闄嶇骇閰嶇疆锛堥拡瀵?@SentinelResource锛?spring.cloud.sentinel:
  transport:
    # Sentinel Dashboard 鍦板潃
    dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
  # 寮€鍚?Sentinel
  enabled: true
  eager: true

---
# 寮€鍙戠幆澧冮厤缃?spring.config.activate.on-profile: dev

spring.cloud.loadbalancer:
  strategy: round-robin

rest.client:
  mtls.enabled: false  # 寮€鍙戠幆澧冨彲绂佺敤 mTLS
  signature.enabled: true

---
# 鐢熶骇鐜閰嶇疆
spring.config.activate.on-profile: prod

spring.cloud.loadbalancer:
  # 鐢熶骇鐜浣跨敤鍔犳潈杞锛屾牴鎹満鍣ㄦ€ц兘鍒嗛厤娴侀噺
  strategy: weighted-round-robin
  nacos.enabled: true

rest.client:
  mtls.enabled: true  # 鐢熶骇鐜蹇呴』鍚敤 mTLS
  signature.enabled: true
  connect-timeout: 3000
  read-timeout: 15000
