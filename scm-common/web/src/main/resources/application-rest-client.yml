spring:
  cloud:
    # Spring Cloud LoadBalancer 配置
    loadbalancer:
      # 负载均衡策略选择
      # 可选值: round-robin（默认轮询）, random（随机）, weighted-round-robin（加权轮询）
      strategy: weighted-round-robin

      # Nacos 权重负载均衡（仅 weighted-round-robin 策略生效）
      nacos:
        enabled: true

      # 健康检查配置
      health-check:
        # 启用健康检查，过滤不健康的实例
        path:
          enabled: true

      # 缓存配置
      cache:
        # 启用实例列表缓存，减少 Nacos 查询频率
        enabled: true
        # 缓存 TTL（秒）
        ttl: 35
        # 缓存容量
        capacity: 256

      # 重试配置
      retry:
        enabled: true
        # 最大重试次数
        max-retries-on-same-service-instance: 0
        max-retries-on-next-service-instance: 1

# RestClient 配置
rest:
  client:
    # 连接超时（毫秒）
    connect-timeout: 5000
    # 读取超时（毫秒）
    read-timeout: 30000

    # mTLS 证书配置
    mtls:
      enabled: true
      keystore:
        location: classpath:certs/client-keystore.p12
        password: ${KEYSTORE_PASSWORD:changeit}
        type: PKCS12
      truststore:
        location: classpath:certs/client-truststore.p12
        password: ${TRUSTSTORE_PASSWORD:changeit}
        type: PKCS12

    # HMAC 签名配置
    signature:
      enabled: true
      app-id: ${API_APP_ID:scm-internal-service}
      secret-key: ${API_SECRET_INTERNAL_SERVICE:your-secret-key-here}
      # 签名算法: HmacSHA256, HmacSHA512
      algorithm: HmacSHA256
      # 签名有效期（秒），防止重放攻击
      max-age: 300

# Sentinel 限流降级配置（针对 @SentinelResource）
spring.cloud.sentinel:
  transport:
    # Sentinel Dashboard 地址
    dashboard: ${SENTINEL_DASHBOARD:localhost:8080}
  # 开启 Sentinel
  enabled: true
  eager: true

---
# 开发环境配置
spring.config.activate.on-profile: dev

spring.cloud.loadbalancer:
  strategy: round-robin

rest.client:
  mtls.enabled: false  # 开发环境可禁用 mTLS
  signature.enabled: true

---
# 生产环境配置
spring.config.activate.on-profile: prod

spring.cloud.loadbalancer:
  # 生产环境使用加权轮询，根据机器性能分配流量
  strategy: weighted-round-robin
  nacos.enabled: true

rest.client:
  mtls.enabled: true  # 生产环境必须启用 mTLS
  signature.enabled: true
  connect-timeout: 3000
  read-timeout: 15000
