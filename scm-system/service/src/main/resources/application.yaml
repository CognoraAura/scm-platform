server:
  port: 8081

spring:
  application:
    name: system-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml?server-addr=${spring.cloud.nacos.server-addr}
      - optional:nacos:common.yaml?server-addr=${spring.cloud.nacos.server-addr}
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        enabled: true
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  # ========== еӨҡж•°жҚ®жәҗй…ҚзҪ® ==========
  datasource:
    dynamic:
      primary: user                    # й»ҳи®Өж•°жҚ®жә?
      strict: true                     # дёҘж јеҢ№й…ҚпјҢжңӘжүҫеҲ°еҲҷжҠҘй”?

      # HikariCP е…ЁеұҖиҝһжҺҘжұ й…ҚзҪ?
      hikari:
        minimum-idle: 5
        maximum-pool-size: 20
        idle-timeout: 30000
        max-lifetime: 1800000
        connection-timeout: 30000

      datasource:
        # з”ЁжҲ·ж•°жҚ®еә?- sys_user, sys_user_oauth, webauthn_credential
        user:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_user
          username: ${DB_USERNAME:admin}
          password: ${DB_PASSWORD:123456}

        # з»„з»Үж•°жҚ®еә?- sys_dept
        org:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_org
          username: ${DB_USERNAME:admin}
          password: ${DB_PASSWORD:123456}

        # жқғйҷҗж•°жҚ®еә?- sys_role, sys_permission, sys_user_role, etc.
        permission:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_permission
          username: ${DB_USERNAME:admin}
          password: ${DB_PASSWORD:123456}

        # е®Ўжү№ж•°жҚ®еә?- sys_permission_approval
        approval:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_approval
          username: ${DB_USERNAME:admin}
          password: ${DB_PASSWORD:123456}

        # е®Ўи®Ўж•°жҚ®еә?- sys_audit_log, sys_sensitive_operation_log
        audit:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_audit
          username: ${DB_USERNAME:admin}
          password: ${DB_PASSWORD:123456}

        # йҖҡзҹҘж•°жҚ®еә?- sys_notification_audit, sys_notification_template, etc.
        notify:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_notify
          username: ${DB_USERNAME:admin}
          password: ${DB_PASSWORD:123456}

    # ========== иҜ»еҶҷеҲҶзҰ»пјҲдё»д»Һпјү ==========
    # ејҖеҗҜеҗҺе°ҶйҖҡиҝҮ common/data зҡ?ReadWriteRoutingDataSource еңЁжҜҸдёӘеә“еҶ…еҒҡ master/slave и·Ҝз”ұпј?
    # д»Қз”ұ dynamic-datasource иҙҹиҙЈең?user/org/permission/... иҝҷдәӣеә“д№Ӣй—ҙйҖүжӢ©пјҲ@DSпјүгҖ?
    rw:
      enabled: ${RW_ENABLED:true}

      # е…ЁеұҖиҙҹиҪҪеқҮиЎЎзӯ–з•Ҙ: ROUND_ROBIN, WEIGHTED_ROUND_ROBIN, RANDOM, WEIGHTED_RANDOM, LEAST_CONNECTIONS
      load-balance: WEIGHTED_ROUND_ROBIN

      # еҶҷеҗҺиҜ»дё»еә“жҢҒз»ӯж—¶й—ҙпјҲи§ЈеҶіиҜ»еҶҷдёҖиҮҙжҖ§пјҢеҶҷе…Ҙеҗ?з§’еҶ…иҜ»ж“ҚдҪңиө°дё»еә“пј?
      read-master-after-write: 2s

      # еӨҚеҲ¶е»¶иҝҹе®№еҝҚпјҲи¶…иҝҮжӯӨеҖјејәеҲ¶иө°дё»еә“пј?
      replication-lag-tolerance: 1s

      # еҒҘеә·жЈҖжҹҘй…ҚзҪ?
      health-check-enabled: true
      health-check-interval: 30s
      failure-threshold: 3

      groups:
        # з”ЁжҲ·ж•°жҚ®еә?
        user:
          master:
            url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:5432/db_user
            username: ${DB_USERNAME:admin}
            password: ${DB_PASSWORD:123456}
            driver-class-name: org.postgresql.Driver
            minimum-idle: 5
            maximum-pool-size: 20
          slaves:
            - name: slave1
              url: jdbc:postgresql://${DB_SLAVE1_HOST:localhost}:5432/db_user
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 2
              minimum-idle: 3
              maximum-pool-size: 15
            - name: slave2
              url: jdbc:postgresql://${DB_SLAVE2_HOST:localhost}:5432/db_user
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 1
              minimum-idle: 3
              maximum-pool-size: 15

        # з»„з»Үж•°жҚ®еә?
        org:
          master:
            url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:5432/db_org
            username: ${DB_USERNAME:admin}
            password: ${DB_PASSWORD:123456}
            driver-class-name: org.postgresql.Driver
            minimum-idle: 5
            maximum-pool-size: 20
          slaves:
            - name: slave1
              url: jdbc:postgresql://${DB_SLAVE1_HOST:localhost}:5432/db_org
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 2
            - name: slave2
              url: jdbc:postgresql://${DB_SLAVE2_HOST:localhost}:5432/db_org
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 1

        # жқғйҷҗж•°жҚ®еә?
        permission:
          master:
            url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:5432/db_permission
            username: ${DB_USERNAME:admin}
            password: ${DB_PASSWORD:123456}
            driver-class-name: org.postgresql.Driver
            minimum-idle: 5
            maximum-pool-size: 20
          slaves:
            - name: slave1
              url: jdbc:postgresql://${DB_SLAVE1_HOST:localhost}:5432/db_permission
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 2
            - name: slave2
              url: jdbc:postgresql://${DB_SLAVE2_HOST:localhost}:5432/db_permission
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 1

        # е®Ўжү№ж•°жҚ®еә?
        approval:
          master:
            url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:5432/db_approval
            username: ${DB_USERNAME:admin}
            password: ${DB_PASSWORD:123456}
            driver-class-name: org.postgresql.Driver
            minimum-idle: 3
            maximum-pool-size: 10
          slaves:
            - name: slave1
              url: jdbc:postgresql://${DB_SLAVE1_HOST:localhost}:5432/db_approval
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 1

        # е®Ўи®Ўж•°жҚ®еә?
        audit:
          master:
            url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:5432/db_audit
            username: ${DB_USERNAME:admin}
            password: ${DB_PASSWORD:123456}
            driver-class-name: org.postgresql.Driver
            minimum-idle: 3
            maximum-pool-size: 10
          slaves:
            - name: slave1
              url: jdbc:postgresql://${DB_SLAVE1_HOST:localhost}:5432/db_audit
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 1

        # йҖҡзҹҘж•°жҚ®еә?
        notify:
          master:
            url: jdbc:postgresql://${DB_MASTER_HOST:localhost}:5432/db_notify
            username: ${DB_USERNAME:admin}
            password: ${DB_PASSWORD:123456}
            driver-class-name: org.postgresql.Driver
            minimum-idle: 3
            maximum-pool-size: 10
          slaves:
            - name: slave1
              url: jdbc:postgresql://${DB_SLAVE1_HOST:localhost}:5432/db_notify
              username: ${DB_USERNAME:admin}
              password: ${DB_PASSWORD:123456}
              driver-class-name: org.postgresql.Driver
              weight: 1
  security:
    default-password: 123456


mybatis-plus:
  # Mapper XML ж–Үд»¶дҪҚзҪ®
  mapper-locations: classpath*:/mapper/**/*.xml
  # е®һдҪ“зұ»еҢ…и·Ҝеҫ„
  type-aliases-package: com.scmcloud.system.entity
  # е…ЁеұҖй…ҚзҪ®
  global-config:
    db-config:
      # иЎЁеҗҚеүҚзјҖ
      table-prefix: tbl_
      # йҖ»иҫ‘еҲ йҷӨеӯ—ж®ө
      logic-delete-field: deleted
      # йҖ»иҫ‘еҲ йҷӨеҖ?
      logic-delete-value: 1
      # йҖ»иҫ‘жңӘеҲ йҷӨеҖ?
      logic-not-delete-value: 0
  configuration:
    # ејҖеҗҜй©јеі°е‘ҪеҗҚиҪ¬жҚ?
    map-underscore-to-camel-case: true
    # SQLж—Ҙеҝ—иҫ“еҮә
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # зј“еӯҳ
    cache-enabled: false

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${spring.cloud.nacos.server-addr}

# ========== Monitoring & Metrics Configuration ==========
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator

  # Micrometer metrics configuration
  metrics:
    tags:
      application: ${spring.application.name}
      service: system-service
      environment: ${ENVIRONMENT:dev}

    # Enable percentile histograms for accurate P95/P99 calculations
    distribution:
      percentiles-histogram:
        "[cross_db_query]": true
        "[http.server.requests]": true

      # Service Level Objectives (SLO) boundaries in nanoseconds
      slo:
        "[cross_db_query]": 50000000,100000000,200000000,500000000,1000000000,2000000000
        "[http.server.requests]": 100000000,200000000,500000000,1000000000,2000000000,5000000000

      # Minimum expected value (for histogram optimization) in nanoseconds
      minimum-expected-value:
        "[cross_db_query]": 1000000

      # Maximum expected value (for histogram optimization) in nanoseconds
      maximum-expected-value:
        "[cross_db_query]": 5000000000

    # Enable JVM and system metrics
    enable:
      jvm: true
      process: true
      system: true
      tomcat: true
      hikaricp: true
      logback: true

# ========== Logging Configuration ==========
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    # Enable debug logging for read-write routing (to verify @Slave/@Master)
    com.scmcloud.common.data.rw: INFO
    com.scmcloud.system.service.query: ${CQRS_LOG_LEVEL:INFO}
    com.scmcloud.system.service.command: ${CQRS_LOG_LEVEL:INFO}

    # HikariCP connection pool logging
    com.zaxxer.hikari: INFO

    # MyBatis SQL logging (disable in production)
    com.scmcloud.system.mapper: ${SQL_LOG_LEVEL:INFO}
