apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-scm-order
  namespace: scm-prod
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - scm-prod
    labelSelectors:
      app: scm-order
  delay:
    latency: '100ms'
    jitter: '10ms'
    correlation: '25'
  duration: '5m'
  scheduler:
    cron: '@every 30m'
