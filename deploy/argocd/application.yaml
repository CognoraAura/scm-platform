apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scm-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/scm-platform.git
    targetRevision: HEAD
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: scm-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
