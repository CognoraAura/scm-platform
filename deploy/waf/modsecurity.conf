# ModSecurity Configuration for SCM Platform
# Based on OWASP ModSecurity Core Rule Set (CRS)

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off

# Timeout settings
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# Temp files
SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data

# Audit logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/modsec_audit.log

# Debug log (disabled in production)
SecDebugLog /var/log/modsecurity/modsec_debug.log
SecDebugLogLevel 0

# Miscellaneous
SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile unicode.mapping 20127
SecStatusEngine On

# Rule exclusions for SCM Platform
# Exclude actuator endpoints
SecRule REQUEST_URI "@beginsWith /actuator" "id:1001,phase:1,pass,nolog,ctl:ruleRemoveById=1-99999"

# Exclude Swagger/OpenAPI
SecRule REQUEST_URI "@contains /swagger" "id:1002,phase:1,pass,nolog,ctl:ruleRemoveById=1-99999"
SecRule REQUEST_URI "@contains /v3/api-docs" "id:1003,phase:1,pass,nolog,ctl:ruleRemoveById=1-99999"
