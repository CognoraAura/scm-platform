# PostgreSQL Read Replica Configuration
# For production deployment with read replicas
#
# Primary-replica streaming replication setup:
# 1. Primary handles all writes
# 2. Replicas handle read queries
# 3. Automatic failover with Patroni
#
# Usage: Deploy alongside patroni.yml for HA setup

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-replica-config
  namespace: scm-prod
data:
  # Read replica connection (for read-heavy queries)
  REPLICA_DB_HOST: "postgresql-replica"
  REPLICA_DB_PORT: "5432"
  REPLICA_DB_NAME: "db_order"

  # Connection pool settings for replicas
  REPLICA_HIKARI_MAXIMUM_POOL_SIZE: "20"
  REPLICA_HIKARI_MINIMUM_IDLE: "5"
  REPLICA_HIKARI_CONNECTION_TIMEOUT: "30000"
  REPLICA_HIKARI_IDLE_TIMEOUT: "600000"
  REPLICA_HIKARI_MAX_LIFETIME: "1800000"
---
# Read replica service
apiVersion: v1
kind: Service
metadata:
  name: postgresql-replica
  namespace: scm-prod
spec:
  selector:
    app: postgresql
    role: replica
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
