[databases]
db_user = host=postgres port=5432 dbname=db_user
db_org = host=postgres port=5432 dbname=db_org
db_permission = host=postgres port=5432 dbname=db_permission
db_approval = host=postgres port=5432 dbname=db_approval
db_audit = host=postgres port=5432 dbname=db_audit
db_notify = host=postgres port=5432 dbname=db_notify
db_product = host=postgres port=5432 dbname=db_product
db_inventory = host=postgres port=5432 dbname=db_inventory
db_order = host=postgres port=5432 dbname=db_order
db_warehouse = host=postgres port=5432 dbname=db_warehouse
db_logistics = host=postgres port=5432 dbname=db_logistics
db_supplier = host=postgres port=5432 dbname=db_supplier
db_tenant = host=postgres port=5432 dbname=db_tenant
db_finance = host=postgres port=5432 dbname=db_finance
db_purchase = host=postgres port=5432 dbname=db_purchase

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
server_reset_query = DISCARD ALL
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_lifetime = 3600
server_idle_timeout = 600
log_connections = 1
log_disconnections = 1