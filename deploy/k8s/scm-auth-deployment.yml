apiVersion: apps/v1
kind: Deployment
metadata:
  name: scm-auth
  namespace: scm-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scm-auth
  template:
    metadata:
      labels:
        app: scm-auth
    spec:
      containers:
        - name: scm-auth
          image: ${DOCKERHUB_USERNAME}/scm-auth:latest
          ports:
            - containerPort: 8106
          envFrom:
            - configMapRef:
                name: scm-config
            - secretRef:
                name: scm-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8106
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8106
            initialDelaySeconds: 20
            periodSeconds: 5
