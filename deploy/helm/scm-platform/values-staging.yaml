# SCM Platform Helm Values - Staging
global:
  environment: staging

# Staging replicas
services:
  gateway:
    replicas: 2
  auth:
    replicas: 2
  system:
    replicas: 2
  inventory:
    replicas: 2
  order:
    replicas: 2

# Staging infrastructure
postgresql:
  auth:
    postgresPassword: ${STAGING_DB_PASSWORD}
  primary:
    persistence:
      size: 10Gi

redis:
  auth:
    password: ${STAGING_REDIS_PASSWORD}
  master:
    persistence:
      size: 2Gi

kafka:
  persistence:
      size: 5Gi

# Enable ingress for staging
ingress:
  enabled: true
  hosts:
    - host: staging.scm.scmcloud.com
      paths:
        - path: /
          pathType: Prefix

# Staging autoscaling
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

# Staging config
config:
  nacos:
    server: "nacos-headless.nacos:8848"
    namespace: "scm-staging"
  logging:
    level:
      com.scmcloud: INFO
