namespace: scm-prod
replicaCount:
  auth: 3
  gateway: 3
  system: 3

image:
  repository: docker.io
  pullPolicy: IfNotPresent

env:
  nacosServer: nacos:8848
  dbHost: postgresql
  dbPort: "5432"
  redisHost: redis
  redisPort: "6379"

resources:
  auth:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  gateway:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"